apiVersion: batch/v1
kind: CronJob
metadata:
  name: risky-cleanup
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          hostPID: true
          containers:
            - name: cleanup
              image: busybox
              command: ["sh", "-c", "echo cleanup"]
